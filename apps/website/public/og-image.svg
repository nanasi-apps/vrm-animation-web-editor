    <path d="M140 215h920" stroke="#fff" stroke-width="1" />
    <path d="M140 275h920" stroke="#fff" stroke-width="1" />
    <path d="M140 335h920" stroke="#fff" stroke-width="1" />
    <path d="M140 395h920" stroke="#fff" stroke-width="1" />
  </g>
  <g filter="url(#glow)">
    <rect x="760" y="134" width="288" height="288" rx="42" fill="#091827" stroke="#7ed8ff" stroke-opacity="0.55" stroke-width="3" />
    <circle cx="904" cy="218" r="42" fill="none" stroke="url(#accent)" stroke-width="12" />
    <path d="M904 266v84M850 310h108M864 392l40-42 42 42" fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round" stroke-width="14" />
    <circle cx="904" cy="350" r="9" fill="#fff" />
  </g>
  <g>
    <rect x="94" y="438" width="1012" height="118" rx="24" fill="#07101b" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.12" />
    <rect x="154" y="472" width="130" height="18" rx="9" fill="#d8e9ff" fill-opacity="0.36" />
    <rect x="154" y="512" width="200" height="18" rx="9" fill="#d8e9ff" fill-opacity="0.22" />
    <path d="M410 450v88M520 450v88M630 450v88M740 450v88M850 450v88M960 450v88" stroke="#ffffff" stroke-opacity="0.1" />
